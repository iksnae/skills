<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">spoken-updates flow</title>
  <desc id="desc">Agent update passes through enabled check, redaction, native TTS, and returns a background PID.</desc>
  <rect width="960" height="280" fill="#0a0a0a"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#727272"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FFCC00"/>
    </marker>
  </defs>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" text-anchor="middle">
    <rect x="40" y="96" width="150" height="64" fill="#161616" stroke="#2a2a2a"/>
    <text x="115" y="135" fill="#e8e8e8">agent update</text>

    <path d="M240 128 L310 82 L380 128 L310 174 Z" fill="#161616" stroke="#2a2a2a"/>
    <text x="310" y="135" fill="#e8e8e8">enabled?</text>

    <rect x="450" y="96" width="150" height="64" fill="#161616" stroke="#2a2a2a"/>
    <text x="525" y="124" fill="#e8e8e8">redact</text>
    <text x="525" y="148" fill="#a8a8a8">+ trim</text>

    <rect x="670" y="96" width="120" height="64" fill="#161616" stroke="#FFCC00"/>
    <text x="730" y="135" fill="#FFCC00">native TTS</text>

    <rect x="840" y="96" width="80" height="64" fill="#161616" stroke="#FFCC00"/>
    <text x="880" y="124" fill="#FFCC00">pid</text>
    <text x="880" y="148" fill="#a8a8a8">json</text>

    <rect x="246" y="214" width="128" height="44" fill="#161616" stroke="#2a2a2a"/>
    <text x="310" y="243" fill="#a8a8a8">skipped</text>
  </g>

  <g fill="none" stroke="#727272" stroke-width="2" marker-end="url(#arrow)">
    <path d="M190 128 H240"/>
    <path d="M310 174 V214"/>
  </g>
  <g fill="none" stroke="#FFCC00" stroke-width="2" marker-end="url(#arrow-accent)">
    <path d="M380 128 H450"/>
    <path d="M600 128 H670"/>
    <path d="M790 128 H840"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" fill="#727272">
    <text x="398" y="114">yes</text>
    <text x="322" y="198">no</text>
  </g>
</svg>
